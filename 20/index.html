<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>CSS Position and Table Exercise</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        /* 1. 表格部分：確保外框與顏色完全一致 */
        table {
            border-collapse: collapse; /* 合併邊框 */
            width: 320px;
            border: 2px solid #333; /* 最外層粗框 */
        }

        th, td {
            border: 1px solid #333; /* 內層細框 */
            padding: 10px 15px;
            text-align: left; /* 文字靠左 */
            font-size: 18px;
        }

        /* 表頭：深灰色背景、白色粗體字 */
        th {
            background-color: #666;
            color: white;
            font-weight: bold;
        }

        /* 表格列背景顏色交替 (依圖片：黃 -> 白 -> 黃) */
        tr:nth-child(1) td { background-color: yellow; }
        tr:nth-child(2) td { background-color: white; }
        tr:nth-child(3) td { background-color: yellow; }

        /* 2. 固定定位區塊：右上方綠色方框 */
        .fixed-div {
            position: fixed;
            top: 25px;      /* 距離頂部 */
            right: 25px;    /* 距離右側 */
            width: 140px;
            height: 140px;
            border: 4px solid #6b8e23; /* 橄欖綠粗邊框 */
            background-color: white;
            padding: 8px;
            box-sizing: border-box; /* 確保邊框不撐大寬度 */
            font-size: 16px;
            line-height: 1.2;
            display: flex;
            align-items: flex-start;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Firstname</th>
                <th>Lastname</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td>2</td>
                <td>2</td>
            </tr>
            <tr>
                <td>3</td>
                <td>3</td>
            </tr>
        </tbody>
    </table>

    <div class="fixed-div">
        This div element has position: fixed;
    </div>

</body>
</html>
