<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>工程師校對版 - 背景延伸修正</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        /* 基礎設定 */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f5f5f5; /* 網頁背景色，方便看出容器 */
            display: flex;
            justify-content: center;
            padding: 50px;
            margin: 0;
        }

        /* 總寬度 496px 的主容器 */
        .main-container {
            width: 496px;
            background-color: #ffffff; /* 蛋白底 */
            border: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 確保圓角效果 */
        }

        /* 標題列：高度 35px */
        .header {
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            border-bottom: 1px solid #eaeaea;
            background-color: #ffffff; /* 標題列保持蛋白底 */
        }

        .header-title {
            font-size: 13px;
            color: #707070;
        }

        /* 按鈕：h22, R8, 內距左右 18 */
        .btn-try-this {
            height: 22px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            color: #2f2f2f;
            font-size: 13px;
            padding: 0 18px; /* 這裡實作了標註中的 18 */
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            outline: none;
            transition: background 0.2s;
        }

        .btn-try-this:hover {
            background-color: #f6f6f6;
        }

       /* --- 核心修正區塊 --- */
        .preview-section {
            /* 第一層：設定蛋白底，並定義左右白邊的寬度 (左20, 右26) */
            background-color: #ffffff; 
            padding-left: 20px;   /* 左側白邊 20px */
            padding-right: 26px;  /* 右側白邊 26px */
            padding-top: 10px;    /* 上方間距 */
            padding-bottom: 10px; /* 下方間距 */
        }

        .orange-bg-box {
            /* 第二層：這層才是橘色底色，它會被包裹在白邊內 */
            background-color: #ffeedd; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0; /* 圖片上下方的橘色留白 */
        }

        .main-image {
            width: 450px; 
            height: 240px;
            object-fit: cover;
            display: block;
        }
        /* --- 展開資訊欄：背景藍色 (#e8f3ff) 與滾輪 --- */
        .info-panel {
            display: none; /* 初始隱藏 */
            background-color: #ffffff;
            border-top: 1px solid #ffffff;
            max-height: 100px; /* 固定高度觸發滾輪 */
            overflow-y: auto;
            padding: 12px 20px;
        }

        /* 資訊文字顏色 #707070 */
        .info-text {
            font-size: 13px;
            color: #707070;
            margin: 5px 0;
            line-height: 1.4;
            white-space: nowrap; /* 確保路徑過長時出現滾輪 */
        }
        
        .info-path {
            word-break: break-all;
            white-space: normal; /* 路徑允許折行 */
        }
    </style>
</head>
<body>

    <div class="container-wrapper">
        <div class="main-container">
            <div class="header">
                <span class="header-title">預覽</span>
                <button class="btn-try-this" id="toggleBtn">查看資訊</button>
            </div>

            <div class="preview-section">
                <div class="orange-side-wrapper">
                    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=450&h=240&auto=format&fit=crop" alt="Preview Image" class="main-image">
                </div>
            </div>

            <div class="info-panel" id="infoPanel">
                <p class="info-text">修改日期：2017/10/12</p>
                <p class="info-text">類別：JPG</p>
                <p class="info-text">大小：466.97KB</p>
                <p class="info-text info-path">路徑：\\designcenter.qnap.com.tw\DesignCenter\PM-RD導入\WEB\Stations\A_Image2PDF\v2\sample</p>
                <p class="info-text">解析度：1920 x 1080</p>
                <p class="info-text">創作者：Design Team</p>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('toggleBtn');
        const panel = document.getElementById('infoPanel');

        btn.addEventListener('click', () => {
            if (panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'block';
                btn.textContent = '收起資訊';
            } else {
                panel.style.display = 'none';
                btn.textContent = '查看資訊';
            }
        });
    </script>

</body>
</html>
